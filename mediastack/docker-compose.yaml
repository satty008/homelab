services:

  # =================================================
  # PHASE 1 – CORE DOWNLOAD & MEDIA
  # =================================================

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
      WEBUI_PORT: 49152
    volumes:
      - /data/config/qbittorrent:/config
      - /data/downloads:/downloads
      - /data/media:/media
    ports:
      - "49152:49152"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped
    networks:
      - npm_proxy

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
      JELLYFIN_PREFER_QSV: "1"   # Intel Quick Sync Video hardware transcoding
    volumes:
      - /data/config/jellyfin:/config
      - /data/media:/media
    ports:
      - "8096:8096"
    devices:
      - /dev/dri:/dev/dri   # required for hardware transcoding
    group_add:
      - "44"    # video group
      - "993"   # render group
    restart: unless-stopped
    networks:
      - npm_proxy

  # =================================================
  # PHASE 2 – AUTOMATION & INDEXING
  # =================================================

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
    volumes:
      - /data/config/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks:
      - npm_proxy

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
    volumes:
      - /data/config/sonarr:/config
      - /data/media/tv:/tv
      - /data/downloads:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks:
      - npm_proxy

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
    volumes:
      - /data/config/radarr:/config
      - /data/media/movies:/movies
      - /data/downloads:/downloads
    ports:
      - "7878:7878"
    restart: unless-stopped
    networks:
      - npm_proxy

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
    volumes:
      - /data/config/bazarr:/config
      - /data/media:/media
    ports:
      - "6767:6767"
    restart: unless-stopped
    networks:
      - npm_proxy

  whisparr:
    image: ghcr.io/thespad/whisparr:latest
    container_name: whisparr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
    volumes:
      - /data/config/whisparr:/config
      - /data/media/adult:/adult
      - /data/downloads:/downloads
    ports:
      - "6969:6969"
    restart: unless-stopped
    networks:
      - npm_proxy

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - TZ=Asia/Kolkata
      - PUID=1000
      - PGID=1000
    ports:
      - "13378:80"
    volumes:
      - /data/media/audiobooks:/audiobooks
      - /data/media/podcasts:/podcasts
      - /data/media/books:/books
      - /data/media/comics:/comics
      - /data/config/audiobookshelf:/config
      - /data/config/audiobookshelf/metadata:/metadata
    restart: unless-stopped
    networks:
      - npm_proxy

  # =================================================
  # PHASE 3 – BOOKS, COMICS, REQUESTS & EXTRAS
  # =================================================

  mylar3:
    image: lscr.io/linuxserver/mylar3:latest
    container_name: mylar3
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
    volumes:
      - /data/config/mylar3:/config
      - /data/media/comics:/comics
      - /data/downloads:/downloads
    ports:
      - "8090:8090"
    restart: unless-stopped
    networks:
      - npm_proxy

  lazylibrarian:
    image: lscr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
    volumes:
      - /data/config/lazylibrarian:/config
      - /data/media/books:/books
      - /data/downloads:/downloads
    ports:
      - "5299:5299"
    restart: unless-stopped
    networks:
      - npm_proxy

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      TZ: Asia/Kolkata
    volumes:
      - /data/config/jellyseerr:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped
    networks:
      - npm_proxy

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      TZ: Asia/Kolkata
    ports:
      - "8191:8191"
    restart: unless-stopped
    networks:
      - npm_proxy

  homepage:
    image: nginx:alpine
    container_name: homepage
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - /data/config/homepage:/usr/share/nginx/html:ro
    networks:
      - npm_proxy

networks:
  npm_proxy:
    external: true